{% extends "base.html" %}

{% block title %}Pregunta de Seguridad - Multimarcas Brazo{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 150px);">
    <div class="card-brazo" style="max-width: 450px; width: 100%; border-top: 4px solid var(--red);">
        <div class="card-header text-center pt-4 pb-0" style="background: transparent; border-bottom: none;">
            <div class="mb-3">
                <i class="fas fa-shield-alt" style="font-size: 40px; color: var(--red); transform: skewX(-10deg);"></i>
            </div>
            <h3 style="font-family: var(--font-display); font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: 1px; color: var(--text);">
                Pregunta de <span style="color: var(--red);">Seguridad</span>
            </h3>
            <p class="text-muted small px-3">
                Responde la siguiente pregunta para verificar tu identidad.
            </p>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label-brazo text-center d-block" style="font-size: 16px;">
                        <i class="fas fa-question-circle me-2 text-danger"></i>{{ pregunta }}
                    </label>
                    <input type="text" name="respuesta" class="form-input-brazo" placeholder="Tu respuesta..." required autofocus>
                </div>

                <div class="d-grid gap-3">
                    <button type="submit" class="btn-primary-brazo py-3" style="font-size: 14px; letter-spacing: 2px; justify-content: center;">
                        <i class="fas fa-check me-2"></i> VERIFICAR
                    </button>

                    <a href="{{ url_for('auth.recuperar_password') }}" class="btn-outline-brazo text-center py-2" style="font-size: 12px; border-color: rgba(255,255,255,0.1);">
                        <i class="fas fa-arrow-left me-2"></i> VOLVER
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
